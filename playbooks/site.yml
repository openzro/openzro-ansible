---
# Full-stack openzro install. Order matters:
#  1. common  — repo + key first, so all subsequent installs use it
#  2. signal  — stateless; comes up fast
#  3. relay   — needs the auth secret, no other deps
#  4. management — needs OIDC + datastore reachable, drives the rest
#  5. dashboard — HTTP frontend; relies on management's REST API
#  6. nginx   — TLS termination + reverse proxy (last so all
#               upstreams already exist)
#  7. cloud_lb — only when openzro_cloud != "none" — point an AWS
#                ALB / GCP forwarding rule at the host's nginx

- name: Common (apt/yum repo + GPG key)
  hosts: all
  become: true
  roles:
    - common

# Optional cluster-coordinator install on the management hosts.
# When openzro_cluster_backend is "embedded" (default for HA),
# nothing runs — the coordinator lives inside openzro-mgmt.
# Set openzro_cluster_backend to "nats" or "redis" if you want
# the broker as a separate daemon (per-process resource isolation,
# independent monitoring).
- name: Cluster coordinator (NATS) — optional
  hosts: management
  become: true
  roles:
    - role: openzro_nats_cluster
      when: openzro_cluster_backend | default('none') == 'nats'

- name: Cluster coordinator (Redis) — optional
  hosts: management
  become: true
  roles:
    - role: openzro_redis_cluster
      when: openzro_cluster_backend | default('none') == 'redis'

- name: Signal
  hosts: signal
  become: true
  roles:
    - openzro_signal

- name: Relay
  hosts: relay
  become: true
  roles:
    - openzro_relay

- name: Management
  hosts: management
  become: true
  roles:
    - openzro_management

- name: Dashboard
  hosts: dashboard
  become: true
  roles:
    - openzro_dashboard

- name: nginx (TLS termination + reverse proxy)
  hosts: dashboard
  become: true
  roles:
    - openzro_nginx

- name: Cloud LB (AWS or GCP — operator's choice via openzro_cloud)
  hosts: localhost
  connection: local
  gather_facts: false
  roles:
    - role: aws_lb
      when: openzro_cloud | default('none') == 'aws'
    - role: gcp_lb
      when: openzro_cloud | default('none') == 'gcp'
