---
# Lab inventory — single host, all-in-one openzro install.
#
# Edit the ansible_host / ansible_user / ansible_ssh_private_key_file
# fields to match your host. The same machine appears in all four
# component groups (management, signal, relay, dashboard) — that's
# the all-in-one shape.

all:
  hosts:
    openzro1:
      ansible_host: 192.168.1.10
      ansible_user: root
      # ansible_ssh_private_key_file: ~/.ssh/id_ed25519

  children:
    management:
      hosts:
        openzro1:
    signal:
      hosts:
        openzro1:
    relay:
      hosts:
        openzro1:
    dashboard:
      hosts:
        openzro1:
