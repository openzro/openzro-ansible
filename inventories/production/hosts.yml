---
# Production inventory — separate hosts per component, HA-shaped.
#
# This is a SKELETON. Multi-replica behavior (Postgres-backed
# management + Redis cluster coordinator) is not yet wired in
# the role tasks; for now this inventory installs a single replica
# per group. Filed under: openzro/openzro HA story (M2 roadmap).

all:
  vars:
    # Production picks Postgres by default — see group_vars/all.yml
    openzro_datastore_engine: postgres

  children:
    management:
      hosts:
        mgmt1.openzro.example.com:
          ansible_user: ubuntu
        # mgmt2.openzro.example.com:   # uncomment when HA story lands
        #   ansible_user: ubuntu

    signal:
      hosts:
        signal1.openzro.example.com:
          ansible_user: ubuntu
        # signal2.openzro.example.com:
        #   ansible_user: ubuntu

    relay:
      hosts:
        relay1.openzro.example.com:
          ansible_user: ubuntu
        relay2.openzro.example.com:
          ansible_user: ubuntu

    dashboard:
      hosts:
        dash1.openzro.example.com:
          ansible_user: ubuntu

    # Routing peers — Linux hosts that expose private CIDRs (VPC
    # subnets, on-prem LANs) into the mesh. Add one host per
    # network you want to attract; CIDRs themselves are configured
    # at the management side (Networks → Resources) bound to the
    # group attached to the setup key, so adding hosts here is
    # purely "more replicas of the same routing peer pool".
    routing_peer:
      hosts:
        routing-peer-us-1.openzro.example.com:
          ansible_user: ubuntu
        # routing-peer-br-1.openzro.example.com:
        #   ansible_user: ubuntu
