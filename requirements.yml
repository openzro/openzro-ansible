---
# Ansible collection dependencies. Install with:
#
#   ansible-galaxy install -r requirements.yml
#
# Cloud collections are required only when openzro_cloud != "none".
# A bare-metal-only deployment can skip them — they're large and
# pull a lot of Python deps. To filter:
#
#   ansible-galaxy install -r requirements.yml \
#       -p ./collections \
#       --skip-cloud   # alias defined per-operator's wrapper

collections:
  # community.general — used by the openzro_dashboard role for the
  # Arch pacman path. Tiny, install for any deployment.
  - name: community.general
    version: ">=8.0.0"

  # AWS — needed only when openzro_cloud == "aws".
  - name: amazon.aws
    version: ">=7.0.0"
  - name: community.aws
    version: ">=7.0.0"

  # GCP — needed only when openzro_cloud == "gcp".
  - name: google.cloud
    version: ">=1.3.0"

  # community.crypto — used by openzro_nginx for self-signed cert
  # generation when openzro_tls_mode == "self_signed". Optional for
  # production where certbot handles cert lifecycle.
  - name: community.crypto
    version: ">=2.0.0"
