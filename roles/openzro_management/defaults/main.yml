---
# Defaults — all overridable via group_vars or host_vars.

openzro_management_package: openzro-management
openzro_management_data_dir: /var/lib/openzro/management
openzro_management_config_dir: /etc/openzro
openzro_management_config_path: "{{ openzro_management_config_dir }}/management.json"
openzro_management_env_file: /etc/default/openzro-management
openzro_management_service: openzro-management.service

# Listening port — gRPC + REST. Public via the dashboard's nginx
# proxy on /api and /management.ManagementService.
openzro_management_port: 33073

# JWT — the management server validates Dex/Keycloak/Auth0 issued
# tokens against the issuer's JWKS. The role passes these into
# management.json's HttpConfig block.
openzro_management_jwt_audience: "{{ openzro_oidc_client_id }}"

# Datastore — see group_vars/all.yml for engine selection.
openzro_management_datastore_engine: "{{ openzro_datastore_engine | default('sqlite') }}"
openzro_management_sqlite_path: "{{ openzro_management_data_dir }}/store.db"

# ---------------------------------------------------------------------
# Cluster coordinator — leave at "none" for single-replica.
# For HA management, set to "embedded" (recommended — no external
# broker needed) and let the role auto-derive openzro_cluster_peers
# from the `management` host group.
#
#   none      — single-replica, no coordination
#   embedded  — each management process embeds a NATS+JetStream server
#               and gossips with peers on tcp/6222 (default port)
#   nats      — connect to an external NATS broker
#   redis     — connect to an external Redis-compatible server
# ---------------------------------------------------------------------
openzro_cluster_backend: "{{ 'embedded' if (groups['management'] | default([])) | length > 1 else 'none' }}"

# Auto-derived peer list: every OTHER management host in the
# inventory, addressed by its private IP / hostname on tcp/6222.
# Override in group_vars to point at specific names if your
# topology has private DNS or a separate management network.
openzro_cluster_peer_port: 6222
openzro_cluster_peers: >-
  {{ groups['management'] | default([])
     | difference([inventory_hostname])
     | map('extract', hostvars, ['ansible_host'])
     | map('regex_replace', '^', 'nats://')
     | map('regex_replace', '$', ':' ~ openzro_cluster_peer_port)
     | list }}

# External-broker variants (only used when openzro_cluster_backend
# is "nats" or "redis"). Vault-encrypt these in real inventories.
openzro_cluster_nats_url: ""
openzro_cluster_redis_url: ""
