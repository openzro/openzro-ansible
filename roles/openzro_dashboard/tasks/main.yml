---
# Bare-metal dashboard install:
#   1. apt/dnf install openzro-dashboard (static bundle + render-env.sh)
#   2. Render /etc/openzro-dashboard.env from the role's template
#   3. Run render-env.sh to substitute env values into the bundle
# nginx is handled by openzro_nginx (separate role); it serves
# the static files from openzro_dashboard_root.

- name: Install openzro-dashboard package (apt)
  ansible.builtin.apt:
    name: "{{ openzro_dashboard_package }}{{ ('=' + openzro_version) if openzro_version is defined else '' }}"
    state: present
    update_cache: true
  when: ansible_pkg_mgr == "apt"
  register: dashboard_pkg_apt

- name: Install openzro-dashboard package (dnf/yum)
  ansible.builtin.dnf:
    name: "{{ openzro_dashboard_package }}{{ ('-' + openzro_version) if openzro_version is defined else '' }}"
    state: present
  when: ansible_pkg_mgr in ["dnf", "yum"]
  register: dashboard_pkg_dnf

- name: Install openzro-dashboard package (pacman)
  community.general.pacman:
    name: "{{ openzro_dashboard_package }}"
    state: present
    update_cache: true
  when: ansible_pkg_mgr == "pacman"
  register: dashboard_pkg_pacman

- name: Render dashboard env file
  ansible.builtin.template:
    src: openzro-dashboard.env.j2
    dest: "{{ openzro_dashboard_env_file }}"
    owner: root
    group: root
    mode: "0640"
    backup: true
  register: dashboard_env_render

# Re-render the static bundle's $$VAR placeholders whenever the
# package was upgraded OR the env values changed. The script is
# idempotent (uses .orig snapshots).
- name: Render env values into the static bundle
  ansible.builtin.command:
    cmd: "{{ openzro_dashboard_root }}/render-env.sh"
  environment:
    DASHBOARD_ROOT: "{{ openzro_dashboard_root }}"
    ENV_FILE: "{{ openzro_dashboard_env_file }}"
  when: >
    dashboard_pkg_apt.changed or
    dashboard_pkg_dnf.changed or
    dashboard_pkg_pacman.changed or
    dashboard_env_render.changed
  changed_when: true
