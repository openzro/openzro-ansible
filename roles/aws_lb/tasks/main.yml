---
# Provisions the ALB (control plane: dashboard + mgmt + signal)
# and NLB (data plane: relay) in front of openZro instances.
#
# Runs from localhost via `connection: local` (see playbooks/site.yml)
# — calls AWS APIs directly, doesn't ssh into the LB itself.
#
# Requires: pip install boto3 botocore  +  ansible-galaxy collection
# install community.aws — both pulled by requirements.yml.

- name: Validate required AWS vars
  ansible.builtin.assert:
    that:
      - aws_vpc_id | length > 0
      - aws_alb_subnets | length >= 2
      - aws_nlb_subnets | length >= 2
      - aws_controller_sg_id | length > 0
      - aws_relay_sg_id | length > 0
      - openzro_public_domain | length > 0
    fail_msg: >-
      aws_lb requires aws_vpc_id, aws_alb_subnets (>= 2 for HA),
      aws_nlb_subnets (>= 2), aws_controller_sg_id,
      aws_relay_sg_id, and openzro_public_domain.

# ---------------------------------------------------------------------
# 1. ACM cert — request one if the operator didn't pre-provide.
# ---------------------------------------------------------------------
- name: Request ACM cert (DNS-01 validation)
  community.aws.acm_certificate:
    domain_name: "{{ openzro_public_domain }}"
    state: present
    region: "{{ aws_region }}"
  register: aws_acm_cert
  when: aws_acm_cert_arn | length == 0

- name: Use operator-provided ACM cert ARN
  ansible.builtin.set_fact:
    openzro_acm_arn: "{{ aws_acm_cert_arn }}"
  when: aws_acm_cert_arn | length > 0

- name: Stash freshly-requested ACM cert ARN
  ansible.builtin.set_fact:
    openzro_acm_arn: "{{ aws_acm_cert.arn }}"
  when: aws_acm_cert_arn | length == 0

# ---------------------------------------------------------------------
# 2. ALB target group + ALB + HTTPS listener.
# ---------------------------------------------------------------------
- name: Create ALB target group (controllers)
  community.aws.elb_target_group:
    name: "{{ aws_alb_tg_name }}"
    region: "{{ aws_region }}"
    protocol: HTTPS
    port: 443
    vpc_id: "{{ aws_vpc_id }}"
    health_check_protocol: HTTPS
    health_check_path: /
    health_check_port: "443"
    successful_response_codes: "200,301,503"   # 503 == nginx-bootstrap during cert provisioning
    target_type: instance
    targets:
      - Id: "{{ item }}"
        Port: 443
    state: present
  loop: "{{ aws_controller_instance_ids }}"
  loop_control:
    label: "{{ item }}"

- name: Create Application LB
  community.aws.elb_application_lb:
    name: "{{ aws_alb_name }}"
    region: "{{ aws_region }}"
    state: present
    scheme: internet-facing
    subnets: "{{ aws_alb_subnets }}"
    security_groups: ["{{ aws_controller_sg_id }}"]
    listeners:
      - Protocol: HTTPS
        Port: 443
        Certificates:
          - CertificateArn: "{{ openzro_acm_arn }}"
        SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
        DefaultActions:
          - Type: forward
            TargetGroupName: "{{ aws_alb_tg_name }}"
      - Protocol: HTTP
        Port: 80
        DefaultActions:
          - Type: redirect
            RedirectConfig:
              Protocol: HTTPS
              Port: "443"
              StatusCode: HTTP_301
  register: openzro_alb

# ---------------------------------------------------------------------
# 3. NLB for the relay tier (UDP + TCP both on 33080).
# ---------------------------------------------------------------------
- name: Create NLB target groups (relay UDP + TCP)
  community.aws.elb_target_group:
    name: "{{ item.name }}"
    region: "{{ aws_region }}"
    protocol: "{{ item.protocol }}"
    port: 33080
    vpc_id: "{{ aws_vpc_id }}"
    target_type: instance
    targets: >-
      {{ aws_relay_instance_ids
         | map('community.general.dict_kv', 'Id')
         | map('combine', {'Port': 33080})
         | list }}
    state: present
  loop:
    - { name: "{{ aws_nlb_tg_udp_name }}", protocol: UDP }
    - { name: "{{ aws_nlb_tg_tcp_name }}", protocol: TCP }
  loop_control:
    label: "{{ item.name }} ({{ item.protocol }})"

- name: Create Network LB
  community.aws.elb_network_lb:
    name: "{{ aws_nlb_name }}"
    region: "{{ aws_region }}"
    state: present
    scheme: internet-facing
    subnets: "{{ aws_nlb_subnets }}"
    listeners:
      - Protocol: UDP
        Port: 33080
        DefaultActions:
          - Type: forward
            TargetGroupName: "{{ aws_nlb_tg_udp_name }}"
      - Protocol: TCP
        Port: 33080
        DefaultActions:
          - Type: forward
            TargetGroupName: "{{ aws_nlb_tg_tcp_name }}"
  register: openzro_nlb

# ---------------------------------------------------------------------
# 4. Route53 alias record — the public domain → ALB. Operators who
#    manage DNS elsewhere can flip aws_manage_dns: false.
# ---------------------------------------------------------------------
- name: Route53 A-alias for the public domain → ALB
  community.aws.route53:
    zone_id: "{{ aws_route53_zone_id }}"
    record: "{{ openzro_public_domain }}"
    type: A
    alias: true
    alias_hosted_zone_id: "{{ openzro_alb.canonical_hosted_zone_id }}"
    value: "{{ openzro_alb.dns_name }}"
    state: present
  when: aws_manage_dns and aws_route53_zone_id | length > 0

- name: Route53 A-alias for relay subdomain → NLB
  community.aws.route53:
    zone_id: "{{ aws_route53_zone_id }}"
    record: "relay.{{ openzro_public_domain }}"
    type: A
    alias: true
    alias_hosted_zone_id: "{{ openzro_nlb.canonical_hosted_zone_id }}"
    value: "{{ openzro_nlb.dns_name }}"
    state: present
  when: aws_manage_dns and aws_route53_zone_id | length > 0
